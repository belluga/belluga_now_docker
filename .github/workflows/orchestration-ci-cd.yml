name: Orchestration CI/CD

on:
  push:
    branches:
      - dev
      - stage
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - dev
      - stage
      - main
  workflow_dispatch:

concurrency:
  group: orchestration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lane_policy:
    name: Lane Promotion Policy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4

      - name: Enforce branch promotion lanes
        if: github.event_name == 'pull_request'
        run: bash .github/scripts/check_promotion_lane.sh

      - name: Skip lane policy on non-PR events
        if: github.event_name != 'pull_request'
        run: |
          echo "SKIP: lane policy is only enforced for pull_request events."

  preflight:
    name: Preflight Validation
    runs-on: ubuntu-latest
    needs:
      - lane_policy
    if: ${{ github.event_name != 'pull_request' || needs.lane_policy.result == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine lane branch
        id: lane
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "branch=${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve submodule checkout auth
        id: submodule_auth
        env:
          SUBMODULES_REPO_TOKEN: ${{ secrets.SUBMODULES_REPO_TOKEN }}
          WEB_APP_REPO_TOKEN: ${{ secrets.WEB_APP_REPO_TOKEN }}
        run: |
          token="${SUBMODULES_REPO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            token="${WEB_APP_REPO_TOKEN:-}"
          fi

          if [[ -n "$token" ]]; then
            echo "::add-mask::$token"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout submodules
        if: steps.submodule_auth.outputs.has_token == 'true'
        env:
          SUBMODULE_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fail when missing submodule token
        if: steps.submodule_auth.outputs.has_token != 'true'
        run: |
          echo "ERROR: missing required secret for private submodule checkout." >&2
          echo "Set SUBMODULES_REPO_TOKEN (recommended) or WEB_APP_REPO_TOKEN in this repository secrets." >&2
          exit 1

      - name: Verify environment invariants
        run: bash .github/scripts/verify_environment_ci.sh

      - name: Enforce protected submodule gitlink guardrail on dev PRs
        run: bash .github/scripts/check_submodule_gitlink_guardrail.sh

      - name: Validate submodule lane alignment
        id: submodule_lane_alignment
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_submodule_branch_alignment.sh "${{ steps.lane.outputs.branch }}"

      - name: Validate web/flutter metadata compatibility
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_web_flutter_metadata.sh "${{ steps.lane.outputs.branch }}"

      - name: Validate pinned submodule SHA CI status (promotion PRs)
        if: ${{ github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') }}
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_submodule_sha_ci_green.sh

      - name: Prepare source promotion PRs (exact SHA, no auto-merge)
        if: ${{ always() && github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') && steps.submodule_lane_alignment.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/prepare_source_promotion_prs.sh

      - name: Validate source promotion PRs are merge-ready
        if: ${{ github.event_name == 'pull_request' && (github.base_ref == 'stage' || github.base_ref == 'main') }}
        env:
          GH_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: bash .github/scripts/check_source_promotion_prs_ready.sh

  deploy_stage:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs:
      - preflight
    if: ${{ github.event_name == 'push' && github.ref_name == 'stage' && needs.preflight.result == 'success' }}
    environment: stage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve submodule checkout auth
        id: submodule_auth
        env:
          SUBMODULES_REPO_TOKEN: ${{ secrets.SUBMODULES_REPO_TOKEN }}
          WEB_APP_REPO_TOKEN: ${{ secrets.WEB_APP_REPO_TOKEN }}
        run: |
          token="${SUBMODULES_REPO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            token="${WEB_APP_REPO_TOKEN:-}"
          fi

          if [[ -n "$token" ]]; then
            echo "::add-mask::$token"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout submodules
        if: steps.submodule_auth.outputs.has_token == 'true'
        env:
          SUBMODULE_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fail when missing submodule token
        if: steps.submodule_auth.outputs.has_token != 'true'
        run: |
          echo "ERROR: missing required secret for private submodule checkout." >&2
          echo "Set SUBMODULES_REPO_TOKEN (recommended) or WEB_APP_REPO_TOKEN in this repository secrets." >&2
          exit 1

      - name: Configure SSH private key
        env:
          STAGE_SSH_PRIVATE_KEY: ${{ secrets.STAGE_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${STAGE_SSH_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: missing required secret STAGE_SSH_PRIVATE_KEY." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGE_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_stage
          chmod 600 ~/.ssh/id_ed25519_stage

      - name: Configure known hosts
        env:
          STAGE_SSH_KNOWN_HOSTS: ${{ secrets.STAGE_SSH_KNOWN_HOSTS }}
        run: |
          if [[ -z "${STAGE_SSH_KNOWN_HOSTS:-}" ]]; then
            echo "ERROR: missing required secret STAGE_SSH_KNOWN_HOSTS." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGE_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Capture stage rollback target revision
        id: stage_rollback_target
        env:
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
        run: |
          set -euo pipefail

          target="$(
            ssh -p "${DEPLOY_SSH_PORT}" -i "${DEPLOY_SSH_KEY_PATH}" \
              -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}" "set -euo pipefail; if [[ -d '${DEPLOY_PATH}/.git' ]]; then cd '${DEPLOY_PATH}'; if [[ -f '.last_successful_revision' ]]; then cat '.last_successful_revision'; elif git rev-parse --verify HEAD >/dev/null 2>&1; then git rev-parse HEAD; fi; fi"
          )"

          target="$(echo "$target" | tr -d '[:space:]')"
          if [[ -n "$target" ]]; then
            echo "revision=$target" >> "$GITHUB_OUTPUT"
            echo "INFO: stage rollback target revision captured: $target"
          else
            echo "INFO: stage rollback target revision unavailable (first deployment path or no git HEAD)."
          fi

      - name: Resolve stage navigation targets
        id: stage_nav_targets
        env:
          NAV_TENANT_URL_INPUT: ${{ vars.STAGE_NAV_TENANT_URL }}
          NAV_LANDLORD_URL_INPUT: ${{ vars.STAGE_NAV_LANDLORD_URL }}
        run: bash .github/scripts/resolve_lane_navigation_targets.sh stage

      - name: Deploy pinned stage stack over SSH
        id: stage_deploy_remote
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.STAGE_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.STAGE_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          DEPLOY_MIN_FREE_GB: ${{ vars.STAGE_DEPLOY_MIN_FREE_GB || '4' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          STAGE_INVITE_TEST_SUPPORT_SECRET: ${{ secrets.STAGE_INVITE_TEST_SUPPORT_SECRET }}
          STAGE_INVITE_TEST_SUPPORT_ALLOWED_TENANTS: ${{ vars.STAGE_INVITE_TEST_SUPPORT_ALLOWED_TENANTS || 'guarappari' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/scripts/deploy_stage_over_ssh.sh

      - name: Preflight stage initialization status
        id: stage_initialize_preflight
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: |
          set -euo pipefail

          landlord="${NAV_LANDLORD_URL%/}"
          initialize_probe_url="${landlord}/api/v1/initialize"
          landlord_host="$(python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$landlord")"
          if [[ -z "$landlord_host" ]]; then
            echo "ERROR: could not parse stage landlord host from NAV_LANDLORD_URL." >&2
            exit 1
          fi

          curl_args=()
          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            initialize_probe_url="http://${NAV_ORIGIN_IP}/api/v1/initialize"
            curl_args+=(-H "Host: ${landlord_host}")
            echo "INFO: stage initialization preflight routed directly to origin ${NAV_ORIGIN_IP} over HTTP host-header probe."
          else
            echo "INFO: stage initialization preflight using public DNS."
          fi

          echo "INFO: checking stage initialization status at ${initialize_probe_url}"
          status=""
          for attempt in $(seq 1 12); do
            status="$(curl -sS -m 15 "${curl_args[@]}" -o /tmp/stage_initialize_response.json -w '%{http_code}' "${initialize_probe_url}")"
            if [[ "${status}" == "200" || "${status}" == "403" ]]; then
              break
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              echo "WARN: stage initialize probe returned HTTP ${status} on attempt ${attempt}/12; retrying in 5s..."
              sleep 5
            fi
          done

          case "${status}" in
            200)
              echo "initialized=true" >> "$GITHUB_OUTPUT"
              ;;
            403)
              echo "initialized=false" >> "$GITHUB_OUTPUT"
              echo "::warning title=Stage not initialized::Skipping navigation smoke because /api/v1/initialize returned HTTP 403."
              cat /tmp/stage_initialize_response.json || true
              ;;
            *)
              echo "ERROR: unexpected stage initialization status ${status}. Expected 200 or 403." >&2
              cat /tmp/stage_initialize_response.json >&2 || true
              exit 1
              ;;
          esac

      - name: Skip stage navigation smoke (environment not initialized)
        if: steps.stage_initialize_preflight.outputs.initialized != 'true'
        run: |
          echo "INFO: skipping stage navigation smoke because environment is not initialized yet."

      - name: Probe public stage environment endpoints
        id: stage_public_edge_environment_probe
        if: steps.stage_initialize_preflight.outputs.initialized == 'true'
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_PUBLIC_EDGE_MAX_ATTEMPTS: '6'
          NAV_PUBLIC_EDGE_SLEEP_SECONDS: '5'
        run: bash .github/scripts/probe_public_navigation_environment_over_https.sh stage

      - name: Setup Node.js for real navigation smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tools/flutter/web_app_smoke_runner/package-lock.json

      - name: Install web navigation dependencies
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        run: npm ci
        working-directory: tools/flutter/web_app_smoke_runner

      - name: Install Playwright browser
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        run: npx playwright install --with-deps chromium
        working-directory: tools/flutter/web_app_smoke_runner

      - name: Route stage smoke hosts directly to origin
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: |
          set -euo pipefail

          parse_host() {
            local input_url="$1"
            python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$input_url"
          }

          landlord_host="$(parse_host "$NAV_LANDLORD_URL")"
          tenant_host="$(parse_host "$NAV_TENANT_URL")"

          if [[ -z "$landlord_host" || -z "$tenant_host" ]]; then
            echo "ERROR: could not parse stage landlord/tenant hosts from navigation URLs." >&2
            exit 1
          fi

          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            {
              echo "${NAV_ORIGIN_IP} ${landlord_host}"
              echo "${NAV_ORIGIN_IP} ${tenant_host}"
            } | sudo tee -a /etc/hosts >/dev/null
            echo "PLAYWRIGHT_IGNORE_HTTPS_ERRORS=true" >> "$GITHUB_ENV"
            echo "INFO: stage smoke mapped ${landlord_host}/${tenant_host} to ${NAV_ORIGIN_IP}."
          else
            echo "PLAYWRIGHT_IGNORE_HTTPS_ERRORS=false" >> "$GITHUB_ENV"
            echo "INFO: stage smoke using public DNS resolution."
          fi

      - name: Warm up stage environment endpoints
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          NAV_WARMUP_MAX_ATTEMPTS: '12'
          NAV_WARMUP_SLEEP_SECONDS: '5'
        run: bash .github/scripts/warmup_navigation_environment_over_https.sh stage

      - name: Validate deployed stage web provenance
        id: stage_provenance_check
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure'
        continue-on-error: true
        env:
          DEPLOY_LANE: stage
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
        run: bash .github/scripts/check_deployed_web_provenance.sh stage

      - name: Run stage real navigation smoke
        id: stage_navigation_smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure'
        continue-on-error: true
        env:
          NAV_DEPLOY_LANE: stage
          NAV_WEB_TEST_TYPE: readonly
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ env.PLAYWRIGHT_IGNORE_HTTPS_ERRORS }}
        run: bash tools/flutter/run_web_navigation_smoke.sh readonly

      - name: Run stage mutation navigation smoke
        id: stage_navigation_mutation_smoke
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_navigation_smoke.outcome != 'failure'
        continue-on-error: true
        env:
          NAV_DEPLOY_LANE: stage
          NAV_WEB_TEST_TYPE: mutation
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ env.PLAYWRIGHT_IGNORE_HTTPS_ERRORS }}
          STAGE_INVITE_TEST_SUPPORT_SECRET: ${{ secrets.STAGE_INVITE_TEST_SUPPORT_SECRET }}
        run: bash tools/flutter/run_web_navigation_smoke.sh mutation

      - name: Resolve Flutter version for stage invite compatibility
        id: stage_invite_flutter_version
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_navigation_smoke.outcome != 'failure' && steps.stage_navigation_mutation_smoke.outcome != 'failure'
        continue-on-error: true
        working-directory: flutter-app
        run: |
          version="$(jq -r '.flutter // empty' .fvmrc 2>/dev/null || true)"

          if [[ -z "$version" || "$version" == "null" ]]; then
            version="$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' .fvmrc | head -n 1 || true)"
          fi

          if [[ -z "$version" ]]; then
            echo "ERROR: unable to resolve Flutter version from flutter-app/.fvmrc" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter SDK for stage invite compatibility
        id: stage_invite_flutter_setup
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_navigation_smoke.outcome != 'failure' && steps.stage_navigation_mutation_smoke.outcome != 'failure' && steps.stage_invite_flutter_version.outcome != 'failure'
        continue-on-error: true
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.stage_invite_flutter_version.outputs.version }}
          channel: stable
          cache: true

      - name: Run stage invite compatibility suite
        id: stage_invite_compatibility
        if: steps.stage_initialize_preflight.outputs.initialized == 'true' && steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && steps.stage_navigation_smoke.outcome != 'failure' && steps.stage_navigation_mutation_smoke.outcome != 'failure' && steps.stage_invite_flutter_version.outcome != 'failure' && steps.stage_invite_flutter_setup.outcome != 'failure'
        continue-on-error: true
        env:
          STAGE_TENANT_URL: ${{ steps.stage_nav_targets.outputs.tenant_url }}
          STAGE_INVITE_TEST_SUPPORT_SECRET: ${{ secrets.STAGE_INVITE_TEST_SUPPORT_SECRET }}
          STAGE_INVITE_DEVICE: linux
        run: |
          dart pub global activate fvm
          export PATH="$HOME/.pub-cache/bin:${PATH}"
          cd flutter-app
          fvm install
          fvm flutter --version
          fvm flutter pub get
          cd ..
          bash tools/flutter/run_stage_invite_compatibility.sh

      - name: Collect stage deploy diagnostics before rollback
        if: ${{ always() && (steps.stage_deploy_remote.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || (steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure' || steps.stage_invite_flutter_version.outcome == 'failure' || steps.stage_invite_flutter_setup.outcome == 'failure' || steps.stage_invite_compatibility.outcome == 'failure'))) }}
        continue-on-error: true
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          NAV_LANDLORD_URL: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.STAGE_SSH_HOST }}
          OUTPUT_FILE: /tmp/stage_deploy_diagnostics.txt
        run: bash .github/scripts/collect_remote_deploy_diagnostics.sh

      - name: Upload stage navigation smoke artifacts
        if: ${{ always() && (steps.stage_deploy_remote.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure' || steps.stage_invite_flutter_version.outcome == 'failure' || steps.stage_invite_flutter_setup.outcome == 'failure' || steps.stage_invite_compatibility.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: stage-navigation-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tools/flutter/web_app_smoke_runner/test-results
            tools/flutter/web_app_smoke_runner/playwright-report
            foundation_documentation/artifacts/tmp/stage-invite-compatibility
            /tmp/stage_deploy_diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Mark stage revision as successful after navigation smoke
        if: steps.stage_public_edge_environment_probe.outcome != 'failure' && steps.stage_provenance_check.outcome != 'failure' && (steps.stage_initialize_preflight.outputs.initialized != 'true' || (steps.stage_navigation_smoke.outcome == 'success' && steps.stage_navigation_mutation_smoke.outcome == 'success' && steps.stage_invite_flutter_version.outcome == 'success' && steps.stage_invite_flutter_setup.outcome == 'success' && steps.stage_invite_compatibility.outcome == 'success'))
        env:
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
        run: bash .github/scripts/mark_successful_revision_over_ssh.sh

      - name: Roll back stage deploy when provenance, preflight, or smoke fails
        id: stage_rollback
        if: ${{ always() && (steps.stage_initialize_preflight.outcome == 'failure' || (steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure' || steps.stage_invite_flutter_version.outcome == 'failure' || steps.stage_invite_flutter_setup.outcome == 'failure' || steps.stage_invite_compatibility.outcome == 'failure'))) }}
        env:
          DEPLOY_LANE: stage
          DEPLOY_SSH_HOST: ${{ vars.STAGE_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.STAGE_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.STAGE_SSH_USER }}
          DEPLOY_PATH: ${{ vars.STAGE_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.STAGE_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.STAGE_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.stage_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_stage
          DEPLOY_MIN_FREE_GB: ${{ vars.STAGE_DEPLOY_MIN_FREE_GB || '4' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ROLLBACK_TARGET_REVISION: ${{ steps.stage_rollback_target.outputs.revision }}
        run: bash .github/scripts/rollback_over_ssh.sh

      - name: Fail stage deploy after rollback
        if: ${{ always() && (steps.stage_deploy_remote.outcome == 'failure' || steps.stage_initialize_preflight.outcome == 'failure' || (steps.stage_initialize_preflight.outputs.initialized == 'true' && (steps.stage_public_edge_environment_probe.outcome == 'failure' || steps.stage_provenance_check.outcome == 'failure' || steps.stage_navigation_smoke.outcome == 'failure' || steps.stage_navigation_mutation_smoke.outcome == 'failure' || steps.stage_invite_flutter_version.outcome == 'failure' || steps.stage_invite_flutter_setup.outcome == 'failure' || steps.stage_invite_compatibility.outcome == 'failure'))) }}
        run: |
          invite_gate_failed=false
          if [[ "${{ steps.stage_invite_flutter_version.outcome }}" == "failure" || "${{ steps.stage_invite_flutter_setup.outcome }}" == "failure" || "${{ steps.stage_invite_compatibility.outcome }}" == "failure" ]]; then
            invite_gate_failed=true
          fi

          if [[ "${{ steps.stage_deploy_remote.outcome }}" == "failure" ]]; then
            echo "ERROR: stage remote deploy script failed before downstream smoke gates. Inspect deploy logs to determine whether internal rollback restored the previous revision." >&2
          elif [[ "${{ steps.stage_initialize_preflight.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage initialization preflight failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.stage_initialize_preflight.outcome }}" == "failure" ]]; then
            echo "ERROR: stage initialization preflight failed; external rollback completed." >&2
          elif [[ "${{ steps.stage_public_edge_environment_probe.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage public-edge environment probe failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.stage_public_edge_environment_probe.outcome }}" == "failure" ]]; then
            echo "ERROR: stage public-edge environment probe failed; external rollback completed." >&2
          elif [[ "${{ steps.stage_provenance_check.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage deployed build provenance validation failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.stage_provenance_check.outcome }}" == "failure" ]]; then
            echo "ERROR: stage deployed build provenance validation failed; external rollback completed." >&2
          elif [[ "${{ steps.stage_navigation_mutation_smoke.outcome }}" == "failure" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage mutation navigation smoke failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.stage_navigation_mutation_smoke.outcome }}" == "failure" ]]; then
            echo "ERROR: stage mutation navigation smoke failed; external rollback completed." >&2
          elif [[ "$invite_gate_failed" == "true" && "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage invite compatibility gate failed and external rollback failed; service may remain degraded." >&2
          elif [[ "$invite_gate_failed" == "true" ]]; then
            echo "ERROR: stage invite compatibility gate failed; external rollback completed." >&2
          elif [[ "${{ steps.stage_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: stage navigation smoke failed and external rollback failed; service may remain degraded." >&2
          else
            echo "ERROR: stage navigation smoke failed; external rollback completed." >&2
          fi
          exit 1

  deploy_main:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - preflight
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.preflight.result == 'success' }}
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve submodule checkout auth
        id: submodule_auth
        env:
          SUBMODULES_REPO_TOKEN: ${{ secrets.SUBMODULES_REPO_TOKEN }}
          WEB_APP_REPO_TOKEN: ${{ secrets.WEB_APP_REPO_TOKEN }}
        run: |
          token="${SUBMODULES_REPO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            token="${WEB_APP_REPO_TOKEN:-}"
          fi

          if [[ -n "$token" ]]; then
            echo "::add-mask::$token"
            echo "has_token=true" >> "$GITHUB_OUTPUT"
            echo "token=$token" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout submodules
        if: steps.submodule_auth.outputs.has_token == 'true'
        env:
          SUBMODULE_TOKEN: ${{ steps.submodule_auth.outputs.token }}
        run: |
          git config --global --unset-all url.https://github.com/.insteadOf || true
          git config --global url."https://x-access-token:${SUBMODULE_TOKEN}@github.com/".insteadOf "https://github.com/"
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Fail when missing submodule token
        if: steps.submodule_auth.outputs.has_token != 'true'
        run: |
          echo "ERROR: missing required secret for private submodule checkout." >&2
          echo "Set SUBMODULES_REPO_TOKEN (recommended) or WEB_APP_REPO_TOKEN in this repository secrets." >&2
          exit 1

      - name: Configure SSH private key
        env:
          MAIN_SSH_PRIVATE_KEY: ${{ secrets.MAIN_SSH_PRIVATE_KEY }}
        run: |
          if [[ -z "${MAIN_SSH_PRIVATE_KEY:-}" ]]; then
            echo "ERROR: missing required secret MAIN_SSH_PRIVATE_KEY." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$MAIN_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519_main
          chmod 600 ~/.ssh/id_ed25519_main

      - name: Configure known hosts
        env:
          MAIN_SSH_KNOWN_HOSTS: ${{ secrets.MAIN_SSH_KNOWN_HOSTS }}
        run: |
          if [[ -z "${MAIN_SSH_KNOWN_HOSTS:-}" ]]; then
            echo "ERROR: missing required secret MAIN_SSH_KNOWN_HOSTS." >&2
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$MAIN_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Capture production rollback target revision
        id: main_rollback_target
        env:
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
        run: |
          set -euo pipefail

          target="$(
            ssh -p "${DEPLOY_SSH_PORT}" -i "${DEPLOY_SSH_KEY_PATH}" \
              -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
              "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}" "set -euo pipefail; if [[ -d '${DEPLOY_PATH}/.git' ]]; then cd '${DEPLOY_PATH}'; if [[ -f '.last_successful_revision' ]]; then cat '.last_successful_revision'; elif git rev-parse --verify HEAD >/dev/null 2>&1; then git rev-parse HEAD; fi; fi"
          )"

          target="$(echo "$target" | tr -d '[:space:]')"
          if [[ -n "$target" ]]; then
            echo "revision=$target" >> "$GITHUB_OUTPUT"
            echo "INFO: production rollback target revision captured: $target"
          else
            echo "INFO: production rollback target revision unavailable (first deployment path or no git HEAD)."
          fi

      - name: Resolve production navigation targets
        id: main_nav_targets
        env:
          NAV_TENANT_URL_INPUT: ${{ vars.MAIN_NAV_TENANT_URL }}
          NAV_LANDLORD_URL_INPUT: ${{ vars.MAIN_NAV_LANDLORD_URL }}
        run: bash .github/scripts/resolve_lane_navigation_targets.sh main

      - name: Deploy pinned production stack over SSH
        id: main_deploy_remote
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.MAIN_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.MAIN_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.main_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          DEPLOY_MIN_FREE_GB: ${{ vars.MAIN_DEPLOY_MIN_FREE_GB || '5' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash .github/scripts/deploy_stage_over_ssh.sh

      - name: Preflight production initialization status
        id: main_initialize_preflight
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: |
          set -euo pipefail

          landlord="${NAV_LANDLORD_URL%/}"
          initialize_probe_url="${landlord}/api/v1/initialize"
          landlord_host="$(python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$landlord")"
          if [[ -z "$landlord_host" ]]; then
            echo "ERROR: could not parse production landlord host from NAV_LANDLORD_URL." >&2
            exit 1
          fi

          curl_args=()
          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            initialize_probe_url="http://${NAV_ORIGIN_IP}/api/v1/initialize"
            curl_args+=(-H "Host: ${landlord_host}")
            echo "INFO: production initialization preflight routed directly to origin ${NAV_ORIGIN_IP} over HTTP host-header probe."
          else
            echo "INFO: production initialization preflight using public DNS."
          fi

          echo "INFO: checking production initialization status at ${initialize_probe_url}"
          status=""
          for attempt in $(seq 1 12); do
            status="$(curl -sS -m 15 "${curl_args[@]}" -o /tmp/main_initialize_response.json -w '%{http_code}' "${initialize_probe_url}")"
            if [[ "${status}" == "200" || "${status}" == "403" ]]; then
              break
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              echo "WARN: production initialize probe returned HTTP ${status} on attempt ${attempt}/12; retrying in 5s..."
              sleep 5
            fi
          done

          case "${status}" in
            200)
              echo "initialized=true" >> "$GITHUB_OUTPUT"
              ;;
            403)
              echo "initialized=false" >> "$GITHUB_OUTPUT"
              echo "::warning title=Production not initialized::Skipping navigation smoke because /api/v1/initialize returned HTTP 403."
              cat /tmp/main_initialize_response.json || true
              ;;
            *)
              echo "ERROR: unexpected production initialization status ${status}. Expected 200 or 403." >&2
              cat /tmp/main_initialize_response.json >&2 || true
              exit 1
              ;;
          esac

      - name: Skip production navigation smoke (environment not initialized)
        if: steps.main_initialize_preflight.outputs.initialized != 'true'
        run: |
          echo "INFO: skipping production navigation smoke because environment is not initialized yet."

      - name: Probe public production environment endpoints
        id: main_public_edge_environment_probe
        if: steps.main_initialize_preflight.outputs.initialized == 'true'
        continue-on-error: true
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_PUBLIC_EDGE_MAX_ATTEMPTS: '6'
          NAV_PUBLIC_EDGE_SLEEP_SECONDS: '5'
        run: bash .github/scripts/probe_public_navigation_environment_over_https.sh main

      - name: Setup Node.js for real navigation smoke
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tools/flutter/web_app_smoke_runner/package-lock.json

      - name: Install web navigation dependencies
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure'
        run: npm ci
        working-directory: tools/flutter/web_app_smoke_runner

      - name: Install Playwright browser
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure'
        run: npx playwright install --with-deps chromium
        working-directory: tools/flutter/web_app_smoke_runner

      - name: Route production smoke hosts directly to origin
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: |
          set -euo pipefail

          parse_host() {
            local input_url="$1"
            python3 -c 'import sys, urllib.parse; print((urllib.parse.urlparse(sys.argv[1]).hostname or "").strip())' "$input_url"
          }

          landlord_host="$(parse_host "$NAV_LANDLORD_URL")"
          tenant_host="$(parse_host "$NAV_TENANT_URL")"

          if [[ -z "$landlord_host" || -z "$tenant_host" ]]; then
            echo "ERROR: could not parse production landlord/tenant hosts from navigation URLs." >&2
            exit 1
          fi

          if [[ -n "${NAV_ORIGIN_IP:-}" ]]; then
            {
              echo "${NAV_ORIGIN_IP} ${landlord_host}"
              echo "${NAV_ORIGIN_IP} ${tenant_host}"
            } | sudo tee -a /etc/hosts >/dev/null
            echo "PLAYWRIGHT_IGNORE_HTTPS_ERRORS=true" >> "$GITHUB_ENV"
            echo "INFO: production smoke mapped ${landlord_host}/${tenant_host} to ${NAV_ORIGIN_IP}."
          else
            echo "PLAYWRIGHT_IGNORE_HTTPS_ERRORS=false" >> "$GITHUB_ENV"
            echo "INFO: production smoke using public DNS resolution."
          fi

      - name: Warm up production environment endpoints
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure'
        env:
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          NAV_WARMUP_MAX_ATTEMPTS: '12'
          NAV_WARMUP_SLEEP_SECONDS: '5'
        run: bash .github/scripts/warmup_navigation_environment_over_https.sh main

      - name: Validate deployed production web provenance
        id: main_provenance_check
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure'
        continue-on-error: true
        env:
          DEPLOY_LANE: main
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
        run: bash .github/scripts/check_deployed_web_provenance.sh main

      - name: Assert mutation suite is hard-blocked on main
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure' && steps.main_provenance_check.outcome != 'failure'
        env:
          NAV_DEPLOY_LANE: main
          NAV_WEB_TEST_TYPE: mutation
        run: |
          set +e
          bash tools/flutter/run_web_navigation_smoke.sh mutation
          guard_status=$?
          set -e

          if [[ "$guard_status" -eq 0 ]]; then
            echo "ERROR: mutation suite must be blocked on main lane." >&2
            exit 1
          fi

          echo "Main hard block check passed (mutation is blocked)."

      - name: Run production real navigation smoke
        id: production_navigation_smoke
        if: steps.main_initialize_preflight.outputs.initialized == 'true' && steps.main_public_edge_environment_probe.outcome != 'failure' && steps.main_provenance_check.outcome != 'failure'
        continue-on-error: true
        env:
          NAV_DEPLOY_LANE: main
          NAV_WEB_TEST_TYPE: readonly
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_TENANT_URL: ${{ steps.main_nav_targets.outputs.tenant_url }}
          PLAYWRIGHT_IGNORE_HTTPS_ERRORS: ${{ env.PLAYWRIGHT_IGNORE_HTTPS_ERRORS }}
        run: bash tools/flutter/run_web_navigation_smoke.sh readonly

      - name: Collect production deploy diagnostics before rollback
        if: ${{ always() && (steps.main_deploy_remote.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || (steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure'))) }}
        continue-on-error: true
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          NAV_LANDLORD_URL: ${{ steps.main_nav_targets.outputs.landlord_url }}
          NAV_ORIGIN_IP: ${{ vars.MAIN_SSH_HOST }}
          OUTPUT_FILE: /tmp/main_deploy_diagnostics.txt
        run: bash .github/scripts/collect_remote_deploy_diagnostics.sh

      - name: Upload production navigation smoke artifacts
        if: ${{ always() && (steps.main_deploy_remote.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure') }}
        uses: actions/upload-artifact@v4
        with:
          name: production-navigation-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            tools/flutter/web_app_smoke_runner/test-results
            tools/flutter/web_app_smoke_runner/playwright-report
            /tmp/main_deploy_diagnostics.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Mark production revision as successful after navigation smoke
        if: steps.main_public_edge_environment_probe.outcome != 'failure' && steps.main_provenance_check.outcome != 'failure' && (steps.main_initialize_preflight.outputs.initialized != 'true' || steps.production_navigation_smoke.outcome == 'success')
        env:
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
        run: bash .github/scripts/mark_successful_revision_over_ssh.sh

      - name: Roll back production deploy when provenance, preflight, or smoke fails
        id: main_rollback
        if: ${{ always() && (steps.main_initialize_preflight.outcome == 'failure' || (steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure'))) }}
        env:
          DEPLOY_LANE: main
          DEPLOY_SSH_HOST: ${{ vars.MAIN_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ vars.MAIN_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ vars.MAIN_SSH_USER }}
          DEPLOY_PATH: ${{ vars.MAIN_DEPLOY_PATH }}
          DEPLOY_NGINX_HOST_PORT_80: ${{ vars.MAIN_NGINX_HOST_PORT_80 }}
          DEPLOY_NGINX_HOST_PORT_443: ${{ vars.MAIN_NGINX_HOST_PORT_443 }}
          DEPLOY_HEALTH_HOST: ${{ steps.main_nav_targets.outputs.landlord_url }}
          DEPLOY_SSH_KEY_PATH: ~/.ssh/id_ed25519_main
          DEPLOY_MIN_FREE_GB: ${{ vars.MAIN_DEPLOY_MIN_FREE_GB || '5' }}
          SUBMODULES_REPO_TOKEN: ${{ steps.submodule_auth.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          ROLLBACK_TARGET_REVISION: ${{ steps.main_rollback_target.outputs.revision }}
        run: bash .github/scripts/rollback_over_ssh.sh

      - name: Fail production deploy after rollback
        if: ${{ always() && (steps.main_deploy_remote.outcome == 'failure' || steps.main_initialize_preflight.outcome == 'failure' || (steps.main_initialize_preflight.outputs.initialized == 'true' && (steps.main_public_edge_environment_probe.outcome == 'failure' || steps.main_provenance_check.outcome == 'failure' || steps.production_navigation_smoke.outcome == 'failure'))) }}
        run: |
          if [[ "${{ steps.main_deploy_remote.outcome }}" == "failure" ]]; then
            echo "ERROR: production remote deploy script failed before downstream smoke gates. Inspect deploy logs to determine whether internal rollback restored the previous revision." >&2
          elif [[ "${{ steps.main_initialize_preflight.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production initialization preflight failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.main_initialize_preflight.outcome }}" == "failure" ]]; then
            echo "ERROR: production initialization preflight failed; external rollback completed." >&2
          elif [[ "${{ steps.main_public_edge_environment_probe.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production public-edge environment probe failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.main_public_edge_environment_probe.outcome }}" == "failure" ]]; then
            echo "ERROR: production public-edge environment probe failed; external rollback completed." >&2
          elif [[ "${{ steps.main_provenance_check.outcome }}" == "failure" && "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production deployed build provenance validation failed and external rollback failed; service may remain degraded." >&2
          elif [[ "${{ steps.main_provenance_check.outcome }}" == "failure" ]]; then
            echo "ERROR: production deployed build provenance validation failed; external rollback completed." >&2
          elif [[ "${{ steps.main_rollback.outcome }}" == "failure" ]]; then
            echo "ERROR: production navigation smoke failed and external rollback failed; service may remain degraded." >&2
          else
            echo "ERROR: production navigation smoke failed; external rollback completed." >&2
          fi
          exit 1
